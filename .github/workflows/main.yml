name: Java CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: '11'

      - name: Build with Gradle (or Maven)
        run: ./gradlew build  # Use 'mvn clean install' if using Maven

      - name: Run tests
        run: ./gradlew test   # Use 'mvn test' if using Maven
