name: Java CI

permissions:
    contents: write
    checks: write
    id-token: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: actions/setup-java@v2
        with:
          java-version: '21' # or whatever version you need
          distribution: 'adopt'
      - name: Compile Java code
        run: |
          javac -cp .:junit-platform-console-standalone-6.0.2.jar src/**/*.java -d out
      - name: Run JUnit tests
        run: |
          java -cp out:junit-platform-console-standalone-6.0.2.jar org.junit.platform.console.ConsoleLauncher --scan-classpath
      - name: Build and Run Tests
        run: '*/test/*'
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6.4.0
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
